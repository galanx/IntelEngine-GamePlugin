# =============================================================================
# Default Relation Overrides
# =============================================================================
# Set initial relations between specific faction pairs.
# Omitted pairs default to 0 (Neutral).
# faction_a and faction_b are alphabetically ordered internally.

default_relations:
  - faction_a: "ImperialFaction"
    faction_b: "ThalmorFaction"
    relation: 50

  - faction_a: "ImperialFaction"
    faction_b: "StormcloakFaction"
    relation: -30

  - faction_a: "StormcloakFaction"
    faction_b: "ThalmorFaction"
    relation: -40

  - faction_a: "BlackBriarFamily"
    faction_b: "ThievesGuildFaction"
    relation: 60

