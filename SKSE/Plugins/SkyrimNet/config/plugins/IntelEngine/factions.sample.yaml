# Faction Politics Configuration — sample defaults
# To restore: copy this file as "factions.yaml" in the same folder.
# If factions.yaml is missing, IntelEngine auto-creates it with these defaults on game load.
# Modders can edit factions.yaml to add/modify factions. It will NOT be overwritten by updates.
