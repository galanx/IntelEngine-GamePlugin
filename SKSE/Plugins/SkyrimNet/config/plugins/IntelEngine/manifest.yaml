plugin:
  name: IntelEngine
  version: "1.0"
  description: "NPC task & story automation engine"
  icon: "\U0001F9E0"

variants:
  - name: intel_story_dm
    description: "Story Dungeon Master decisions — uses base OpenRouter config unless overridden below"

schema:
  fields:
    # ── UI ──
    - name: "Dashboard Hotkey"
      path: "ui.dashboard_hotkey"
      type: "hotkey"
      description: "Main key for dashboard toggle (VK code, e.g., 55 = 7). Set to -1 to disable."
      defaultValue: 55
      min: -1
      max: 255
      category: "UI"

    - name: "Dashboard Modifiers"
      path: "ui.dashboard_modifiers"
      type: "int"
      description: "Modifier key bitmask: 1=Ctrl, 2=Shift, 4=Alt. Combine with +. Default 3 = Ctrl+Shift."
      defaultValue: 0
      min: 0
      max: 7
      category: "UI"

    - name: "UI Scale"
      path: "ui.scale"
      type: "float"
      description: "Dashboard zoom level. 1.3 = default, 1.5-2.0 for 4K monitors."
      defaultValue: 1.3
      min: 0.8
      max: 2.0
      category: "UI"

    # ── Story Engine ──
    - name: "Faction Blocklist"
      path: "story.faction_blocklist"
      type: "string"
      description: "Comma-separated faction EditorIDs to exclude from story candidates. Append :rank to filter by max rank (e.g., PrisonerFaction,ImperialFaction:1 blocks all prisoners and Imperials rank 0-1)"
      defaultValue: ""
      category: "Story Engine"

    - name: "Location Blocklist"
      path: "story.location_blocklist"
      type: "string"
      description: "Comma-separated location names where NPC dispatch is blocked (e.g., 'Bleak Falls Barrow,Dustman's Cairn'). Case-insensitive. Blocks new dispatches and cancels in-progress ones."
      defaultValue: ""
      category: "Story Engine"

    - name: "NPC Blocklist"
      path: "story.npc_blocklist"
      type: "string"
      description: "Comma-separated NPC display names to exclude from story candidates (e.g., 'Nazeem,Heimskr'). Case-insensitive. Blocked NPCs will never be picked by the Dungeon Master."
      defaultValue: ""
      category: "Story Engine"

    # ── LLM Overrides (leave empty to use base OpenRouter config) ──
    - name: "API Endpoint"
      path: "llm.endpoint"
      type: "string"
      description: "Custom API endpoint URL (e.g., http://localhost:5000/v1). Leave empty to use the base OpenRouter endpoint."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "API Key"
      path: "llm.api_key"
      type: "string"
      description: "API key for the custom endpoint. Leave empty to use the base OpenRouter API key."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "Model Override"
      path: "llm.model_name"
      type: "string"
      description: "Override model name for story DM. Leave empty to use the same model as dialogue."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "Temperature Override"
      path: "llm.temperature"
      type: "float"
      description: "Override sampling temperature. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0.0
      max: 2.0
      category: "LLM Overrides"

    - name: "Max Tokens Override"
      path: "llm.max_tokens"
      type: "int"
      description: "Override max response tokens. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0
      max: 4096
      category: "LLM Overrides"

    - name: "Timeout Override"
      path: "llm.timeout"
      type: "int"
      description: "Override request timeout in seconds. Set to 0 to use the base config value."
      defaultValue: 0
      min: 0
      max: 120
      category: "LLM Overrides"
