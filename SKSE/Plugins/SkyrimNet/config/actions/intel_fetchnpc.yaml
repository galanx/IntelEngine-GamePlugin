name: FetchPerson
description: >
  PLAYER-INITIATED ONLY. The PLAYER must explicitly ask you to go get someone and bring them back.

  This action means: leave where you are, find a specific person, and bring them to the player.

  ONLY trigger when {{ player.name }} says something like:
  - "go get Ysolda"
  - "bring Nazeem here"
  - "fetch Alvor for me"
  - "go find the guard and bring him"

  NEVER trigger on your own initiative. NEVER trigger because:
  - You think someone should come here
  - You want to introduce the player to someone
  - The conversation mentions another NPC
  - You decide on your own that someone's presence is needed

  If {{ player.name }} did not directly ask you to bring someone, do NOT pick this action.

questEditorId: IntelEngine
scriptName: IntelEngine_NPCTasks
executionFunctionName: FetchNPC

parameterMapping:
  - type: speaker
    name: akAgent
    description: You (the NPC doing the fetching)
  - type: dynamic
    name: targetName
    description: >
      The person to fetch. Must be a named NPC or hold guard.
      Valid: "Ysolda", "Nazeem", "Whiterun Guard"
      INVALID: "Soldier", "Courier", "Messenger", "Bandit", "Traveler".
      If you cannot name a specific person, do NOT use this action.
  - type: dynamic
    name: failReason
    description: >
      Should the target refuse? Set to "none" if they come willingly.
      If they would refuse, write the reason.

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

enabled: true
defaultPriority: 4
tags: []
