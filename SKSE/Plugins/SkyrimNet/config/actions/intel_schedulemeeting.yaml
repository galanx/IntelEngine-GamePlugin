customCategory: intel_scheduling
name: ScheduleMeeting
description: >
  Plan to travel to a specific place at a specific future time. You stay put now and go later.

  WHEN TO USE: Someone explicitly agrees to meet at a named place and time, or you make a
  deliberate plan to go somewhere later.

  WHEN NOT TO USE:
  - Casual farewells like "see you later", "goodbye", "take care" — these are social niceties, NOT plans
  - Vague statements like "maybe sometime" or "we should hang out" — no concrete commitment
  - The conversation just mentions a place without any plan to go there
  - You are already AT the destination
  - No specific time was mentioned or implied

  Examples that SHOULD trigger:
  - "meet me at the inn at sunset" (specific place + specific time)
  - "I'll come by Dragonsreach tomorrow morning" (explicit plan with place + time)
  - "sure, I'll be at the marketplace at noon" (agreed commitment)

  Examples that should NOT trigger:
  - "see you tonight" (vague farewell — no place specified)
  - "goodbye, take care" (social pleasantry)
  - "maybe we can meet sometime" (no commitment)
  - "I was at the market earlier" (past event, not a plan)

questEditorId: IntelEngine
scriptName: IntelEngine_Schedule
executionFunctionName: ScheduleMeeting

parameterMapping:
  - type: speaker
    name: akNPC
    description: You (the NPC scheduling the meeting)
  - type: dynamic
    name: destination
    description: >
      Where to meet. MUST be a specific, real Skyrim location that someone could walk to.
      Use the EXACT name of an inn, shop, house, keep, or landmark — NOT a hold, province, or region.
      GOOD: "The Bannered Mare", "Dragonsreach", "Candlehearth Hall", "Palace of the Kings", "the marketplace", "Arcadia's Cauldron"
      BAD: "Cyrodiil" (province), "Eastmarch" (hold), "Skyrim" (region), "the city" (too vague)
      Use "home" only for your own home.
  - type: dynamic
    name: timeCondition
    description: >
      When to arrive. Must be a specific time, not vague.
      Examples: "at dawn", "at noon", "in the evening", "tonight",
      "after sunset", "tomorrow morning", "in 2 hours"

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

eventString: "{{ actor.name }} plans to be at {{ destination }} {{ timeCondition }}"
isShortLived: false
enabled: true
defaultPriority: 4
tags: []
