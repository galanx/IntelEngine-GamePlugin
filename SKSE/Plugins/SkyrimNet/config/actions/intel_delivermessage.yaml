customCategory: intel_communication
name: DeliverMessage
description: >
  PLAYER-INITIATED ONLY. The PLAYER must explicitly ask you to go deliver a message to someone.

  This action means: leave where you are, travel to find a specific person, and tell them something.

  ONLY trigger when {{ player.name }} says something like:
  - "go tell Alvor the shipment arrived"
  - "warn Adrianne about the bandits"
  - "let Nazeem know I'm looking for him"
  - "go deliver this message to Jarl Balgruuf"

  NEVER trigger on your own initiative. NEVER trigger because:
  - You think someone should be told something
  - The conversation topic involves another NPC
  - You want to gossip or share news
  - You feel like talking to someone
  - The player mentions another NPC's name without asking you to go to them

  If {{ player.name }} did not directly ask you to go relay words to someone, do NOT pick this action.

  If the message asks the target to meet somewhere, fill meetLocation and meetTime.

questEditorId: IntelEngine
scriptName: IntelEngine_NPCTasks
executionFunctionName: DeliverMessage

parameterMapping:
  - type: speaker
    name: akAgent
    description: You (the messenger)
  - type: dynamic
    name: targetName
    description: >
      Who to deliver the message to. Must be a named NPC or a hold guard.
      Valid: "Jarl Balgruuf", "Nazeem", "Adrianne Avenicci", "Whiterun Guard"
      INVALID: made-up roles like "Stormcloak Messenger", "Imperial Soldier", "Bandit",
      "Courier", "Traveler", "Merchant", "Stranger" — these are NOT resolvable NPCs.
      If you cannot identify a specific named NPC or guard, do NOT use this action.
  - type: dynamic
    name: msgContent
    description: >
      The specific message to deliver. Must be a concrete statement {{ player.name }} asked you to relay.
  - type: dynamic
    name: meetLocation
    description: >
      If the message asks the target to MEET somewhere, provide the location.
      If NOT a meeting request: set this to "none"
  - type: dynamic
    name: meetTime
    description: >
      If the message includes a MEETING TIME, provide it.
      If NOT a meeting request: set this to "none"

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

enabled: true
defaultPriority: 4
tags: []
