name: GoToLocation
description: >
  Leave immediately and travel to a specific place.

  TRIGGER WORDS that indicate travel intent:
  "go to", "head to", "walk to", "travel to", "make your way to", "get to",
  "go home", "go back", "return to", "leave", "head out", "go outside",
  "go upstairs", "go downstairs", "go inside", "step outside"

  If the conversation does NOT contain one of these patterns (or similar), do NOT trigger this action.
  Simply MENTIONING a place name is NOT a travel command.

  DESTINATION must be one of these two categories:

  A) SEMANTIC KEYWORDS — use ONLY these exact words (resolved by the engine):
  - "home" or "my home" — your own residence
  - "<Name>'s home" or "<Name>'s house" — another NPC's residence (e.g., "Camilla's house", "Alvor's home")
  - "upstairs" or "downstairs" — vertical movement within current building
  - "outside" or "inside" — enter or exit current building
  - "the kitchen" or "the bedroom" or "the cellar" — rooms within current building
  Nothing else from this category is valid. Do NOT improvise semantic keywords.

  B) NAMED SKYRIM LOCATIONS — any real location that exists in the game world.
  Examples (not exhaustive — any real Skyrim location is valid):
  - Cities: Whiterun, Solitude, Riften, Markarth, Windhelm, Falkreath, Morthal, Dawnstar, Winterhold
  - Towns: Riverwood, Rorikstead, Dragon Bridge, Ivarstead, Shor's Stone, Karthwasten
  - Buildings: Dragonsreach, Bannered Mare, Bee and Barb, Blue Palace, Jorrvaskr, Arcadia's Cauldron
  The location MUST actually exist in Skyrim. Do NOT invent location names.

  INVALID destinations (NEVER use these):
  - A person's name by itself (e.g., "Nazeem", "Camilla") — use FetchPerson or DeliverMessage
  - Made-up locations that don't exist in Skyrim
  - Vague descriptions like "behind the house", "near the river", "over there", "the back room"
  - Abstract concepts like "to work", "to the market stall", "to the forge"

  WHEN NOT TO USE:
  - No travel keyword was spoken — someone just mentioned a place in conversation
  - You want to go LATER — use ScheduleMeeting instead
  - The destination is a PERSON — use FetchPerson or DeliverMessage instead
  - Normal daily routine (going to work, eating, sleeping) — the game handles this
  - You are already at the destination

questEditorId: IntelEngine
scriptName: IntelEngine_Travel
executionFunctionName: GoToLocation

parameterMapping:
  - type: speaker
    name: akNPC
    description: You (the NPC traveling)
  - type: dynamic
    name: destination
    description: >
      Where to travel. Use ONLY:
      - A semantic keyword from list A: "home", "upstairs", "downstairs", "outside", "inside",
        "the kitchen", "the bedroom", "the cellar", "<Name>'s house"
      - OR a real Skyrim location name: "Whiterun", "Bannered Mare", "Dragonsreach", etc.
      NEVER use a person's name alone. NEVER invent locations. NEVER use vague descriptions.
  - type: dynamic
    name: speed
    description: >
      Travel speed: 0=walk, 1=jog, 2=run.
      Casual=0, normal=1, urgent=2
  - type: dynamic
    name: waitForPlayer
    description: >
      1 if the player asked or told you to go there.
      0 if you decided to go on your own.
  - type: static
    value: false
    name: isScheduled

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

enabled: true
defaultPriority: 5
tags: []
