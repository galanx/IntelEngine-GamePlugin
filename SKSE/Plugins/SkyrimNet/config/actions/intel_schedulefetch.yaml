name: ScheduleFetch
description: >
  Plan to fetch someone LATER. You stay put now and go get them when the time comes.

  WHEN TO USE: Someone asks you to bring a specific person at a future time.

  WHEN NOT TO USE:
  - Fetch them NOW — use FetchPerson instead
  - Deliver WORDS later — use ScheduleDelivery instead
  - Go to a PLACE later — use ScheduleMeeting instead
  - Nobody asked — do not self-assign

questEditorId: IntelEngine
scriptName: IntelEngine_Schedule
executionFunctionName: ScheduleFetch

parameterMapping:
  - type: speaker
    name: akNPC
    description: You (the NPC who will do the fetching later)
  - type: dynamic
    name: targetName
    description: >
      The person to fetch. Must be a named NPC or hold guard (e.g., "Ysolda", "Whiterun Guard").
      INVALID: "Soldier", "Courier", "Messenger", "Bandit", "Traveler".
  - type: dynamic
    name: timeCondition
    description: >
      When to go fetch them. Examples: "at dawn", "after sunset", "tonight"

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

eventString: "{{ actor.name }} plans to fetch {{ targetName }} {{ timeCondition }}"
isShortLived: false
enabled: true
defaultPriority: 4
tags: []
