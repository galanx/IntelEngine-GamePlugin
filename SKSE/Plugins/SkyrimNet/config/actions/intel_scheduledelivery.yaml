name: ScheduleDelivery
description: >
  Plan to deliver a message to someone LATER. You stay put now and go when the time comes.

  WHEN TO USE: Someone asks you to relay a specific message to a specific person at a future time.

  WHEN NOT TO USE:
  - Deliver the message NOW — use DeliverMessage instead
  - Fetch a PERSON later — use ScheduleFetch instead
  - Go to a PLACE later — use ScheduleMeeting instead
  - Nobody asked — do not self-assign

questEditorId: IntelEngine
scriptName: IntelEngine_Schedule
executionFunctionName: ScheduleDelivery

parameterMapping:
  - type: speaker
    name: akNPC
    description: You (the NPC who will deliver the message later)
  - type: dynamic
    name: targetName
    description: >
      Who to deliver the message to. Must be a named NPC or hold guard (e.g., "Nazeem", "Riften Guard").
      INVALID: "Soldier", "Courier", "Messenger", "Bandit", "Traveler".
  - type: dynamic
    name: msgContent
    description: >
      The message to deliver.
  - type: dynamic
    name: timeCondition
    description: >
      When to deliver. Examples: "at dawn", "after sunset", "tonight"
  - type: dynamic
    name: meetLocation
    description: >
      If the message includes a meeting request, provide a specific named location
      (inn, shop, keep, landmark — NOT a hold or province name).
      GOOD: "The Bannered Mare", "Dragonsreach". BAD: "Eastmarch", "Skyrim".
      If NOT a meeting request: set this to "none"
  - type: dynamic
    name: meetTime
    description: >
      If the message includes a meeting time, provide it.
      If NOT a meeting request: set this to "none"

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

eventString: "{{ actor.name }} plans to deliver a message to {{ targetName }} {{ timeCondition }}"
isShortLived: false
enabled: true
defaultPriority: 4
tags: []
