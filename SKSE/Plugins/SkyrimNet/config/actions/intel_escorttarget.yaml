customCategory: intel_travel
name: EscortTarget
description: >
  Walk WITH someone to a destination. You personally accompany them the entire journey.

  Examples:
  - "take Alvor home", "walk Ysolda to the inn", "escort her to safety"

  CRITICAL: The target must be a DIFFERENT NPC, NEVER {{ player.name }} and NEVER yourself. You escort OTHER people — if {{ player.name }} wants YOU to go somewhere, that is GoToLocation, not EscortTarget. If {{ player.name }} says "go to the inn" or "head to Dragonsreach", use GoToLocation. EscortTarget is ONLY for when {{ player.name }} explicitly asks you to take/walk/escort ANOTHER NAMED NPC somewhere.

  DECISION RULES:
  - "take X to Y" or "walk X to Y" = EscortTarget (X must NOT be {{ player.name }})
  - "bring X here" or "get X" = FetchPerson
  - "tell X to come" = DeliverMessage

questEditorId: IntelEngine
scriptName: IntelEngine_NPCTasks
executionFunctionName: EscortTarget

parameterMapping:
  - type: speaker
    name: akAgent
    description: You (the NPC doing the escorting)
  - type: dynamic
    name: targetName
    description: >
      The person to escort. Must be a named NPC or a hold guard.
      NEVER {{ player.name }} — you cannot escort the player.
      Valid: "Nazeem", "Adrianne Avenicci", "Whiterun Guard"
      INVALID: "{{ player.name }}", "Soldier", "Courier", "Messenger", "Bandit", "Traveler".
      If you cannot name a specific person, do NOT use this action.
  - type: dynamic
    name: destination
    description: >
      Where to escort them. Use "home" if taking them home.
      Otherwise use a specific named place: "Dragonsreach", "The Bannered Mare", "Candlehearth Hall".
      NEVER use hold/province names ("Eastmarch", "Cyrodiil") or vague descriptions ("the city").
  - type: dynamic
    name: shouldWait
    description: >
      1 if the escorted person should wait at the destination for the player.
      0 if they should just stay there and resume normal life.
      Use 1 when: the player asked for the escort, someone is being taken somewhere for the player to meet.
      Use 0 when: taking someone home, moving someone away from danger.

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

enabled: true
defaultPriority: 6
tags: []
