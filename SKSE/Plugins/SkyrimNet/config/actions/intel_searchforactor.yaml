customCategory: intel_travel
name: SearchForActor
description: >
  Lead someone TO a person. You guide, they follow — you travel TOGETHER.

  Examples:
  - "take me to Alvor", "show me where Ysolda is", "help me find Nazeem"

  DECISION RULES:
  - Requester COMES WITH YOU = SearchForActor (travel together)
  - Requester STAYS BEHIND, you go alone = FetchPerson (solo round trip)
  - You carry words, not guide someone = DeliverMessage

questEditorId: IntelEngine
scriptName: IntelEngine_NPCTasks
executionFunctionName: SearchForActor

parameterMapping:
  - type: speaker
    name: akAgent
    description: You (the NPC helping search)
  - type: dynamic
    name: targetName
    description: >
      The person to search for. Must be a named NPC or a hold guard.
      Valid: "Ysolda", "Faendal", "Riften Guard"
      INVALID: "Soldier", "Courier", "Messenger", "Bandit", "Traveler".
      If you cannot name a specific person, do NOT use this action.
      Examples: "Nazeem", "Jarl Balgruuf", "Adrianne Avenicci"
  - type: dynamic
    name: speed
    description: >
      Travel speed: 0=walk (default), 1=jog, 2=run (urgent).

eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
      - decoratorName: is_busy
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true

enabled: true
defaultPriority: 6
tags: []
